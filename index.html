<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主要筋肉の起始・停止フラッシュカード</title>
<style>
body { font-family: sans-serif; background-color: #f0f7f4; color: #333; margin: 0; padding: 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; min-height: 100vh; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
#app-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
h1 { font-size: 20px; color: #02693E; margin-bottom: 10px; text-align: center; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 20px; text-align: center; font-weight: bold; }
#muscle-img-wrapper { width: 100%; max-width: 400px; margin-bottom: 15px; display: none; }
#muscle-img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background-color: #fff; pointer-events: none; }
#quiz-container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
.question { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; line-height: 1.4; color: #02693E; pointer-events: none; }
#furigana-container { display: none; font-size: 16px; color: #888; margin-bottom: 10px; text-align: center; line-height: 1.2; pointer-events: none; }
#answer-container { display: none; font-size: 28px; font-weight: bold; color: #ef4444; margin-bottom: 20px; text-align: center; line-height: 1.4; pointer-events: none; }
.btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
.btn:active { opacity: 0.8; }
#result-screen, #logo-container { display: none; text-align: center; }
#start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; }
#quiz-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 250px; cursor: pointer; }
.tap-guide { font-size: 13px; color: #aaa; margin-top: 30px; text-align: center; pointer-events: none; }
#logo-container { margin-top: 20px; text-align: center; width: 100%; pointer-events: none; }
#logo-container img { max-width: 150px; height: auto; opacity: 0.8; }
.start-logo { max-width: 200px; height: auto; margin-bottom: 20px; }
#progress-text { font-size: 14px; color: #666; text-align: right; width: 100%; margin-bottom: 15px; font-weight: bold; pointer-events: none; }
</style>
</head>
<body>

<div id="app-wrapper">

<div id="muscle-img-wrapper">
<img id="muscle-img" src="" alt="筋肉画像" onerror="this.style.display='none'">
</div>

<div id="quiz-container">

<div id="start-screen">
<img src="logo.png" alt="ロゴ" class="start-logo" id="start-logo-img">
<h1>起始・停止フラッシュカード</h1>
<p class="subtitle">「続かない運動」を「心地よい習慣へ」。</p>
<button id="start-btn" class="btn" style="text-align: center; background-color: #02693E; color: white;">学習をスタート</button>
</div>

<div id="quiz-screen">
<div id="progress-text"></div>
<div id="question-text" class="question"></div>
<div id="furigana-container"></div>
<div id="answer-container"></div>
<div class="tap-guide">画面のどこかをタップ、または左右にスワイプ</div>
</div>

<div id="result-screen">
<h1>1周完了しました！</h1>
<div style="font-size: 16px; margin-top: 20px; color: #333; line-height: 1.6;">
反復学習で知識を定着させましょう。


お疲れ様でした！
</div>
<button id="reset-btn" class="btn" style="margin-top: 30px; text-align: center; background-color: #02693E; color: white;">最初からやり直す</button>
</div>

</div>
<div id="logo-container">
<img src="logo.png" alt="ロゴ" id="footer-logo-img">
</div>
</div>

<script>
document.getElementById('start-logo-img').addEventListener('error', function() { this.style.display='none'; });
document.getElementById('footer-logo-img').addEventListener('error', function() { this.style.display='none'; });

const quizData = [
{ question: "「大胸筋(鎖骨部)」の起始は？", answer: "鎖骨内側1/2", furigana: "さこつないそく", image: "daikyoukin.png" },
{ question: "「大胸筋(胸肋部)」の起始は？", answer: "胸骨・第2~6肋軟骨", furigana: "きょうこつ・だい2〜6ろくなんこつ", image: "daikyoukin.png" },
{ question: "「大胸筋(腹部)」の起始は？", answer: "腹直筋鞘", furigana: "ふくちょくきんしょう", image: "daikyoukin.png" },
{ question: "「大胸筋」の停止は？", answer: "上腕骨大結節稜", furigana: "じょうわんこつだいけっせつりょう", image: "daikyoukin.png" },
{ question: "「広背筋」の起始は？", answer: "第6~12胸椎棘突起、腰椎・仙骨・腸骨稜、下部肋骨3~4本", furigana: "だい6〜12きょうついきょくとっき、ようつい・せんこつ・ちょうこつりょう、かぶろっこつ", image: "kouhaikin.png" },
{ question: "「広背筋」の停止は？", answer: "上腕骨小結節稜", furigana: "じょうわんこつしょうけっせつりょう", image: "kouhaikin.png" },

{ question: "「三角筋(中部)」の起始は？", answer: "肩峰", furigana: "けんぽう", image: "sankakukin.png" },

{ question: "「僧帽筋」の停止は？", answer: "鎖骨外側1/3 肩峰・肩甲棘", furigana: "さこつがいそく けんぽう・けんこうきょく", image: "souboukin.png" },
{ question: "「上腕二頭筋(短頭)」の起始は？", answer: "烏口突起", furigana: "うこうとっき", image: "jouwannitoukin.png" },
{ question: "「上腕二頭筋(長頭)」の起始は？", answer: "関節上結節", furigana: "かんせつじょうけっせつ", image: "jouwannitoukin.png" },
{ question: "「上腕二頭筋」の停止は？", answer: "橈骨粗面・前腕筋膜", furigana: "とうこつそめん・ぜんわんきんまく", image: "jouwannitoukin.png" },
{ question: "「上腕三頭筋(長頭)」の起始は？", answer: "関節下結節", furigana: "かんせつかけっせつ", image: "jouwansantoukin.png" },
{ question: "「上腕三頭筋(外側頭)」の起始は？", answer: "上腕骨後面(近位)", furigana: "じょうわんこつこうめん (きんい)", image: "jouwansantoukin.png" },
{ question: "「上腕三頭筋(内側頭)」の起始は？", answer: "上腕骨後面(遠位)", furigana: "じょうわんこつこうめん (えんい)", image: "jouwansantoukin.png" },
{ question: "「上腕三頭筋」の停止は？", answer: "尺骨肘頭", furigana: "しゃっこつちゅうとう", image: "jouwansantoukin.png" },
{ question: "「上腕筋」の起始は？", answer: "上腕骨前面遠位1/2", furigana: "じょうわんこつぜんめんえんい", image: "jouwankin.png" },
{ question: "「上腕筋」の停止は？", answer: "尺骨粗面", furigana: "しゃっこつそめん", image: "jouwankin.png" },
{ question: "「烏口腕筋」の起始は？", answer: "烏口突起", furigana: "うこうとっき", image: "ukouwankin.png" },
{ question: "「烏口腕筋」の停止は？", answer: "上腕骨内側面中部", furigana: "じょうわんこつないそくめんちゅうぶ", image: "ukouwankin.png" },
{ question: "「前腕屈筋群(浅指屈筋)」の起始は？", answer: "内側上顆・尺骨・橈骨", furigana: "ないそくじょうか・しゃっこつ・とうこつ", image: "senshikuttsukin.png" },
{ question: "「前腕屈筋群(浅指屈筋)」の停止は？", answer: "第2~5指中節骨", furigana: "だい2〜5しちゅうせつこつ", image: "senshikuttsukin.png" },

{ question: "「前腕伸筋群(総指伸筋)」の停止は？", answer: "第2~5指末節背側", furigana: "だい2〜5しまっせつはいそく", image: "soushishinkin.png" },
{ question: "「大腿四頭筋(大腿直筋)」の起始は？", answer: "下前腸骨棘", furigana: "かぜんちょうこつきょく", image: "daitaichokkkin.png" },
{ question: "「大腿四頭筋(大腿直筋)」の停止は？", answer: "膝蓋骨→脛骨粗面", furigana: "しつがいこつ → けいこつそめん", image: "daitaichokkkin.png" },
{ question: "「大腿四頭筋(外側広筋)」の起始は？", answer: "大転子・転子間線", furigana: "だいてんし・てんしかんせん", image: "gaisokukoukin.png" },
{ question: "「大腿四頭筋(外側広筋)」の停止は？", answer: "膝蓋骨→脛骨粗面", furigana: "しつがいこつ → けいこつそめん", image: "gaisokukoukin.png" },
{ question: "「大腿四頭筋(内側広筋)」の起始は？", answer: "大腿骨内側面", furigana: "だいたいこつないそくめん", image: "naisokukoukin.png" },
{ question: "「大腿四頭筋(内側広筋)」の停止は？", answer: "膝蓋骨→脛骨粗面", furigana: "しつがいこつ → けいこつそめん", image: "naisokukoukin.png" },
{ question: "「大腿四頭筋(中間広筋)」の起始は？", answer: "大腿骨前外側面", furigana: "だいたいこつぜんがいそくめん", image: "chuukankoukin.png" },
{ question: "「大腿四頭筋(中間広筋)」の停止は？", answer: "膝蓋骨→脛骨粗面", furigana: "しつがいこつ → けいこつそめん", image: "chuukankoukin.png" },
{ question: "「ハムストリング(大腿二頭筋・長頭)」の起始は？", answer: "坐骨結節", furigana: "ざこつけっせつ", image: "daitainitoukin.png" },
{ question: "「ハムストリング(大腿二頭筋・短頭)」の起始は？", answer: "大腿骨粗線", furigana: "だいたいこつそせん", image: "daitainitoukin.png" },
{ question: "「ハムストリング(大腿二頭筋)」の停止は？", answer: "腓骨頭", furigana: "ひこつとう", image: "daitainitoukin.png" },
{ question: "「ハムストリング(半膜様筋)」の起始は？", answer: "坐骨結節", furigana: "ざこつけっせつ", image: "hanmakuyoukin.png" },
{ question: "「ハムストリング(半膜様筋)」の停止は？", answer: "脛骨内側後面", furigana: "けいこつないそくこうめん", image: "hanmakuyoukin.png" },
{ question: "「ハムストリング(半腱様筋)」の起始は？", answer: "坐骨結節", furigana: "ざこつけっせつ", image: "hankenyoukin.png" },
{ question: "「ハムストリング(半腱様筋)」の停止は？", answer: "脛骨内側前面(鵞足)", furigana: "けいこつないそくぜんめん (がそく)", image: "hankenyoukin.png" },
{ question: "「大臀筋」の起始は？", answer: "腸骨稜・仙骨・尾骨・仙結節靭帯", furigana: "ちょうこつりょう・せんこつ・びこつ・せんけっせつじんたい", image: "daidenkin.png" },
{ question: "「大臀筋」の停止は？", answer: "大腿骨殿筋粗面・腸脛靭帯", furigana: "だいたいこつでんきんそめん・ちょうけいじんたい", image: "daidenkin.png" },
{ question: "「中臀筋」の起始は？", answer: "腸骨外側面", furigana: "ちょうこつがいそくめん", image: "chuudenkin.png" },
{ question: "「中臀筋」の停止は？", answer: "大転子", furigana: "だいてんし", image: "chuudenkin.png" },
{ question: "「小臀筋」の起始は？", answer: "腸骨外側面", furigana: "ちょうこつがいそくめん", image: "shoudenkin.png" },
{ question: "「小臀筋」の停止は？", answer: "大転子前面", furigana: "だいてんしぜんめん", image: "shoudenkin.png" },
{ question: "「内転筋群(大内転筋)」の起始は？", answer: "恥骨枝・坐骨枝・坐骨結節", furigana: "ちこつし・ざこつし・ざこつけっせつ", image: "dainaitenkin.png" },
{ question: "「内転筋群(大内転筋)」の停止は？", answer: "大腿骨粗線・内転筋結節", furigana: "だいたいこつそせん・ないてんきんけっせつ", image: "dainaitenkin.png" },
{ question: "「縫工筋」の起始は？", answer: "上前腸骨棘", furigana: "じょうぜんちょうこつきょく", image: "houkoukin.png" },
{ question: "「縫工筋」の停止は？", answer: "脛骨内側前面(鵞足)", furigana: "けいこつないそくぜんめん (がそく)", image: "houkoukin.png" },
{ question: "「腓腹筋」の起始は？", answer: "大腿骨内外側上顆", furigana: "だいたいこつないがいそくじょうか", image: "hifukukin.png" },
{ question: "「腓腹筋」の停止は？", answer: "踵骨隆起(アキレス腱)", furigana: "しょうこつりゅうき (あきれすけん)", image: "hifukukin.png" },
{ question: "「ヒラメ筋」の起始は？", answer: "腓骨頭・脛骨ヒラメ筋線", furigana: "ひこつとう・けいこつひらめきんせん", image: "hiramekin.png" },
{ question: "「ヒラメ筋」の停止は？", answer: "踵骨隆起(アキレス腱)", furigana: "しょうこつりゅうき (あきれすけん)", image: "hiramekin.png" },
{ question: "「前脛骨筋」の起始は？", answer: "脛骨外側面・骨間膜", furigana: "けいこつがいそくめん・こっかんまく", image: "zenkeikotsukin.png" },
{ question: "「前脛骨筋」の停止は？", answer: "内側楔状骨・第1中足骨底", furigana: "ないそくけつじょうこつ・だい1ちゅうそっこつてい", image: "zenkeikotsukin.png" },
{ question: "「腓骨筋(長腓骨筋)」の起始は？", answer: "腓骨上1/2外側面", furigana: "ひこつじょう 1/2 がいそくめん", image: "chouhikotsukin.png" },
{ question: "「腓骨筋(長腓骨筋)」の停止は？", answer: "第1中足骨底・内側楔状骨", furigana: "だい1ちゅうそっこつてい・ないそくけつじょうこつ", image: "chouhikotsukin.png" },

{ question: "「外腹斜筋」の起始は？", answer: "第5~12肋骨外側面", furigana: "だい5〜12ろっこつがいそくめん", image: "gaifukushakin.png" },
{ question: "「外腹斜筋」の停止は？", answer: "腸骨稜・白線・鼠径靭帯", furigana: "ちょうこつりょう・はくせん・そけいじんたい", image: "gaifukushakin.png" },
{ question: "「内腹斜筋」の起始は？", answer: "腸骨稜・鼠径靭帯・胸腰筋膜", furigana: "ちょうこつりょう・そけいじんたい・きょうようきんまく", image: "naifukushakin.png" },
{ question: "「内腹斜筋」の停止は？", answer: "第10~12肋骨・白線", furigana: "だい10〜12ろっこつ・はくせん", image: "naifukushakin.png" },
{ question: "「腹横筋」の起始は？", answer: "第7~12肋軟骨・腸骨稜・鼠径靭帯・胸腰筋膜", furigana: "だい7〜12ろくなんこつ・ちょうこつりょう・そけいじんたい・きょうようきんまく", image: "fukuoukin.png" },
{ question: "「腹横筋」の停止は？", answer: "白線・恥骨・腹直筋鞘", furigana: "はくせん・ちこつ・ふくちょくきんしょう", image: "fukuoukin.png" }
];

let currentQuestionIndex = 0;
let isShowingAnswer = false;

document.getElementById("start-btn").addEventListener("click", function() {
document.getElementById("start-screen").style.display = "none";
document.getElementById("quiz-screen").style.display = "flex";
document.getElementById("logo-container").style.display = "block";
currentQuestionIndex = 0;
loadQuestion();
});

document.getElementById("reset-btn").addEventListener("click", function() {
document.getElementById("result-screen").style.display = "none";
document.getElementById("start-screen").style.display = "flex";
});

let touchStartX = 0;
let touchEndX = 0;
let isSwiping = false;

document.addEventListener("touchstart", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
touchStartX = e.changedTouches[0].screenX;
isSwiping = false;
}, {passive: true});

document.addEventListener("touchend", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
touchEndX = e.changedTouches[0].screenX;
const threshold = 50;

if (touchEndX < touchStartX - threshold) {
isSwiping = true;
advanceState();
} else if (touchEndX > touchStartX + threshold) {
isSwiping = true;
goBackState();
}
}, {passive: true});

document.addEventListener("click", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
if (isSwiping) return;
advanceState();
});

function advanceState() {
if (!isShowingAnswer) {
showAnswer();
} else {
if (currentQuestionIndex < quizData.length - 1) {
currentQuestionIndex++;
loadQuestion();
} else {
showResult();
}
}
}

function goBackState() {
if (isShowingAnswer) {
loadQuestion();
} else if (currentQuestionIndex > 0) {
currentQuestionIndex--;
loadQuestion();
}
}

function loadQuestion() {
isShowingAnswer = false;
const currentQuiz = quizData[currentQuestionIndex];
document.getElementById("progress-text").textContent = (currentQuestionIndex + 1) + " / " + quizData.length + " 問目";
document.getElementById("question-text").textContent = "Q" + (currentQuestionIndex + 1) + ". " + currentQuiz.question;

document.getElementById("furigana-container").style.display = "none";
document.getElementById("answer-container").style.display = "none";

const muscleImg = document.getElementById("muscle-img");
if (currentQuiz.image) {
muscleImg.src = currentQuiz.image;
document.getElementById("muscle-img-wrapper").style.display = "block";
} else {
document.getElementById("muscle-img-wrapper").style.display = "none";
}
}

function showAnswer() {
isShowingAnswer = true;
const currentQuiz = quizData[currentQuestionIndex];

const furiganaContainer = document.getElementById("furigana-container");
if (currentQuiz.furigana) {
furiganaContainer.textContent = currentQuiz.furigana;
furiganaContainer.style.display = "block";
}

const answerContainer = document.getElementById("answer-container");
answerContainer.textContent = currentQuiz.answer;
answerContainer.style.display = "block";
}

function showResult() {
document.getElementById("quiz-screen").style.display = "none";
document.getElementById("logo-container").style.display = "none";
document.getElementById("muscle-img-wrapper").style.display = "none";
document.getElementById("result-screen").style.display = "block";
}
</script>

</body>
</html>
